<!DOCTYPE html><html><head><title>Evolution 11010001 - 2026-06-08 05-01</title>
    <style>
      body { background: #000; color: #ff0; text-align: center; font-family: monospace; }
      canvas { border: 1px solid #ff0; image-rendering: pixelated; }
    </style>
    </head><body>
    <h1>Auto-Game: Evolution 11010001</h1>
    <p>Rule: 11010001. Generation: <span id="gen">0</span></p>
    <canvas id="evo" width="400" height="400"></canvas>
    <script>
      const cvs = document.getElementById('evo');
      const ctx = cvs.getContext('2d');
      const res = 4;
      const cols = cvs.width / res;
      const rows = cvs.height / res;
      let grid = Array(cols).fill().map(() => Array(rows).fill(0).map(() => Math.random() > 0.5 ? 1 : 0));
      let gen = 0;
      
      function update() {
        let next = grid.map(arr => [...arr]);
        for(let i=0; i<cols; i++) for(let j=0; j<rows; j++) {
          let n = 0;
          for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
            if(x===0 && y===0) continue;
            n += grid[(i+x+cols)%cols][(j+y+rows)%rows];
          }
          // Dynamic rule based on the random bits
          if(grid[i][j]) next[i][j] = parseInt("11010001"[n % 8]) ? 1 : 0;
          else next[i][j] = parseInt("11010001"[(n+1) % 8]) ? 1 : 0;
        }
        grid = next;
        gen++;
        document.getElementById('gen').innerText = gen;
        draw();
      }
      
      function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,cvs.width,cvs.height);
        ctx.fillStyle = '#ff0';
        for(let i=0; i<cols; i++) for(let j=0; j<rows; j++) {
          if(grid[i][j]) ctx.fillRect(i*res, j*res, res, res);
        }
      }
      setInterval(update, 50);
    </script>
    <br><br><a href="../index.html" style="color:cyan;">[back to home]</a>
    </body></html>
